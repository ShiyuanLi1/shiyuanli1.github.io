title: Shiyuan Li
description: Personal website
theme: bay_jekyll_theme

header:
  pages:
    - name: Home
      slug: /
    - name: Research
      slug: /research
    - name: Teaching
      slug: /teaching
    - name: CV
      slug: /cv

footer:
  show_powered_by: false

  contact:
    - type: email
      name: Email
      value: shiyuan.li@kuleuven.be

    - name: Address
      value: Naamsestraat 69, 3000 Leuven, Belgium
  follow:
    - type: github
      name: GitHub
      link: https://github.com/ShiyuanLi1

#    - type: linkedin
#      name: LinkedIn
#      link: https://www.linkedin.com/in/yourprofile

