<header class="site-header">
  <div class="wrapper">
    <span class="site-title" rel="author" href="{{ "/" | relative_url }}">
      {{ site.title }}
    </span>

    <nav class="site-nav">
      {% for page in site.header.pages %}
        <a class="page-link" href="{{ page.slug | relative_url }}">{{ page.name }}</a>
      {% endfor %}
    </nav>
  </div>
</header>

<style>
  body {
    font-size: 16px !important;
    line-height: 1.75 !important;
  }

  .site-title {
    font-size: 34px !important;
    text-decoration: none !important;
  }

  .site-nav .page-link {
    font-size: 16px !important;
  }
</style>
